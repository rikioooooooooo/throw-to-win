<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kosukuma 3D Model Viewer</title>
<style>
  body { margin: 0; background: #111; overflow: hidden; }
  canvas { display: block; }
  #info { position: absolute; top: 10px; left: 10px; color: #aaa; font: 13px monospace; }
</style>
</head>
<body>
<div id="info">Drag to rotate / Scroll to zoom</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0.5, 2.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 3;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(2, 3, 4);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0x00fa9a, 0.4);
dir2.position.set(-2, -1, -3);
scene.add(dir2);

// Grid
scene.add(new THREE.GridHelper(4, 20, 0x333333, 0x222222));

// Load model
new GLTFLoader().load('/kosukuma-particle.glb', (gltf) => {
  const model = gltf.scene;

  // Center and scale
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 1.5 / maxDim;
  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  model.position.y += size.y * scale / 2;

  scene.add(model);

  document.getElementById('info').textContent =
    `Kosukuma 3D — ${(3703712/1024).toFixed(0)}KB | ` +
    `Size: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)} | ` +
    `Drag to rotate / Scroll to zoom`;
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
