<script>
// Generate remaining tiers by cloning and changing pattern
const tiers = [
  { id: "iron", color: "#8A8A8A" },
  { id: "bronze", color: "#CD7F32" },
  { id: "silver", color: "#C0C0C0" },
  { id: "gold", color: "#FFB800" },
  { id: "platinum", color: "#E5E4E2" },
  { id: "emerald", color: "#50C878" },
  { id: "diamond", color: "#B9F2FF" },
  { id: "master", color: "#9B59B6" },
  { id: "legend", color: "#FF2D2D" },
];

const grid = document.querySelector('.grid');
const template = document.querySelector('.tier');

tiers.forEach(tier => {
  const clone = template.cloneNode(true);
  const svg = clone.querySelector('svg');

  // Update pattern
  const defs = svg.querySelector('defs');
  defs.innerHTML = `<pattern id="p-${tier.id}" patternUnits="userSpaceOnUse" width="648" height="444"><image href="/tiers/${tier.id}.webp" width="648" height="444" preserveAspectRatio="xMidYMid slice"/></pattern>`;

  // Update all fill references
  svg.querySelectorAll('[fill="url(#p-rookie)"]').forEach(el => {
    el.setAttribute('fill', `url(#p-${tier.id})`);
  });

  // Update name
  const nameEl = clone.querySelector('.name');
  nameEl.textContent = tier.id.charAt(0).toUpperCase() + tier.id.slice(1);
  nameEl.style.color = tier.color;

  grid.appendChild(clone);
});
</script>
